version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nemicare-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-nemicare}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nemicare_dev_password}
      POSTGRES_DB: ${DB_NAME:-nemicare_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nemicare"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nemicare-network

  # Redis Cache (for Bull queue jobs, sessions)
  redis:
    image: redis:7-alpine
    container_name: nemicare-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nemicare-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nemicare-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: postgresql://${DB_USER:-nemicare}:${DB_PASSWORD:-nemicare_dev_password}@postgres:5432/${DB_NAME:-nemicare_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev
    networks:
      - nemicare-network

  # Frontend SPA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nemicare-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev
    networks:
      - nemicare-network

volumes:
  postgres_data:

networks:
  nemicare-network:
    driver: bridge
